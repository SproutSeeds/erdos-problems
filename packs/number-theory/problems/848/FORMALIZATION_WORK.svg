<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc"><title id="title">Erdos Problem #848 formalization work diagram</title><desc id="desc">Diagram of the 848 shared-prefix row progression showing when tracked anchors hit witness 841 and why anchor 282 is special at row index 0.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbf7"/><stop offset="100%" stop-color="#eef4f2"/></linearGradient><linearGradient id="panel" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f6fbfa"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0d3b30" flood-opacity="0.08"/></filter></defs><rect x="0" y="0" width="1440" height="980" fill="url(#bg)"/><rect x="40" y="34" width="1360" height="912" rx="28" fill="#ffffff" stroke="#d7e6df" filter="url(#shadow)"/><text x="88" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#11352e">Erdos Problem #848: 282 / 841 Mechanism</text><text x="88" y="126" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#44635a">Representative 137720141 on tuple 4, 23^2, 7^2, 9, 17^2, 11^2</text><text x="88" y="152" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#44635a">Witness 841 is the extra repair witness; the row progression itself still traverses all residues modulo 841.</text><text x="88" y="174" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#44635a">Tuple-row CRT projects to 504 mod 841, stabilizing when anchor 132 is added.</text><rect x="88" y="184" width="220" height="72" rx="18" fill="url(#panel)" stroke="#d6e5df"/><rect x="89" y="185" width="218" height="9" rx="8" fill="#0f766e"/><text x="104" y="218" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#45645b">Verdict</text><text x="104" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#173c34">controlled_congruence_candidate</text><rect x="326" y="184" width="220" height="72" rx="18" fill="url(#panel)" stroke="#d6e5df"/><rect x="327" y="185" width="218" height="9" rx="8" fill="#1d4ed8"/><text x="342" y="218" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#45645b">Representative residue</text><text x="342" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#173c34">504 mod 841</text><rect x="564" y="184" width="220" height="72" rx="18" fill="url(#panel)" stroke="#d6e5df"/><rect x="565" y="185" width="218" height="9" rx="8" fill="#b91c1c"/><text x="580" y="218" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#45645b">282 row start</text><text x="580" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#173c34">t = 0</text><rect x="802" y="184" width="270" height="72" rx="18" fill="url(#panel)" stroke="#d6e5df"/><rect x="803" y="185" width="268" height="9" rx="8" fill="#7c3aed"/><text x="818" y="218" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#45645b">Next same-row 282 hit</text><text x="818" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#173c34">27443256270065</text><rect x="1090" y="184" width="260" height="72" rx="18" fill="url(#panel)" stroke="#d6e5df"/><rect x="1091" y="185" width="258" height="9" rx="8" fill="#9a3412"/><text x="1106" y="218" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#45645b">Verified base</text><text x="1106" y="242" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#173c34">1..10000</text><rect x="64" y="240" width="1